services:
  db:
    image: mysql:8.0
    container_name: banco
    environment:
      MYSQL_ROOT_PASSWORD: senhamuitosegura
      MYSQL_DATABASE: senhas
      
    volumes:
      - ./arquivos/db:/var/lib/mysql
      - ./arquivos/sqlInite/init.sql:/docker-entrypoint-initdb.d/init.sql

  php:
    build: ./arquivos/php
    container_name: php
    depends_on:
      - db
    
    volumes:
      - ./arquivos:/var/www/html

  web:
    image: nginx:alpine
    
    ports:
      - "8080:80"
    
    volumes:
      - ./arquivos:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php